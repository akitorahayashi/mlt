name: Run Static Checks

on:
  workflow_call:

jobs:
  run-static-checks:
    name: Run Static Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Run Linters
        run: just check
