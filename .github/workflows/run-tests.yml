name: Run Tests

on:
  workflow_call:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install marp-cli
        run: npm install -g @marp-team/marp-cli

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Run tests
        run: just test
